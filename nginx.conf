server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Clean URLs: /admin -> /admin.html
  location / {
    try_files $uri $uri.html $uri/ =404;
  }

  # popup.js: explicit content-type + permissive CORS so any site can embed.
  location = /popup.js {
    add_header Content-Type "application/javascript; charset=utf-8" always;
    add_header Cache-Control "public, max-age=300" always;
    add_header Access-Control-Allow-Origin "*" always;
  }

  # Light caching for the demo page.
  location = / {
    add_header Cache-Control "public, max-age=60" always;
  }

  # Gzip for everything text-ish.
  gzip on;
  gzip_types text/plain text/css application/javascript application/json text/html;
  gzip_min_length 256;
}
